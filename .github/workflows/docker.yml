---
name: "Docker"

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set TERM environment variable
        run: echo "TERM=xterm" >> $GITHUB_ENV

      - name: Extract branch or tag name
        run: |
          if [[ -n "${GITHUB_HEAD_REF}" ]]; then
            # This is a PR, use the source branch name
            echo "REF_NAME=${GITHUB_HEAD_REF}" >> $GITHUB_ENV
          else
            # This is a push, use the branch or tag name from GITHUB_REF
            echo "REF_NAME=${GITHUB_REF##*/}" >> $GITHUB_ENV
          fi

      - name: Set TAG
        run: |
          if [[ "${{ env.REF_NAME }}" == "master" ]]; then
            echo "TAG=latest" >> $GITHUB_ENV
          else
            echo "TAG=${{ env.REF_NAME }}" >> $GITHUB_ENV
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: ${{ github.event_name != 'pull_request' }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: make bootstrap-dev

      - name: Run Docker lint
        run: make docker-lint

      - name: Run Docker build (amd64)
        run: make docker-build
        env:
          TAG: ${{ env.TAG }}
          DOCKER_BUILD_PLATFORM: linux/amd64

      - name: Run Docker build (arm64)
        if: ${{ github.event_name != 'pull_request' }}
        run: make docker-build
        env:
          TAG: ${{ env.TAG }}
          DOCKER_BUILD_PLATFORM: linux/arm64

      # push images to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAG: ${{ env.TAG }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
        run: |
          SANITIZED_TAG="${TAG//\//-}"
          make docker-buildx-setup
          docker buildx build --no-cache --platform linux/amd64,linux/arm64 --tag "${REGISTRY}/automation:${SANITIZED_TAG}" --file automation/Dockerfile --push .
          docker buildx build --no-cache --platform linux/amd64,linux/arm64 --tag "${REGISTRY}/console_ui:${SANITIZED_TAG}" --file console/ui/Dockerfile --push .
          docker buildx build --no-cache --platform linux/amd64,linux/arm64 --tag "${REGISTRY}/console_api:${SANITIZED_TAG}" --file console/service/Dockerfile --push .
          docker buildx build --no-cache --platform linux/amd64,linux/arm64 --tag "${REGISTRY}/console_db:${SANITIZED_TAG}" --file console/db/Dockerfile --push .
          docker buildx build --no-cache --platform linux/amd64,linux/arm64 --tag "${REGISTRY}/console:${SANITIZED_TAG}" --file console/Dockerfile --push .
