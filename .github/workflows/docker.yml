---
name: "Docker"

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set TERM environment variable
        run: echo "TERM=xterm" >> $GITHUB_ENV

      - name: Extract branch or tag name
        run: |
          if [[ -n "${GITHUB_HEAD_REF}" ]]; then
            echo "REF_NAME=${GITHUB_HEAD_REF}" >> $GITHUB_ENV
          else
            echo "REF_NAME=${GITHUB_REF##*/}" >> $GITHUB_ENV
          fi

      - name: Set TAG
        run: |
          if [[ "${{ env.REF_NAME }}" == "master" ]]; then
            echo "TAG=latest" >> $GITHUB_ENV
          else
            echo "TAG=${{ env.REF_NAME }}" >> $GITHUB_ENV
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: make bootstrap-dev

      - name: Run Docker lint
        run: make docker-lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push automation image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: automation/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/automation:${{ env.TAG }}
          cache-from: type=gha,scope=automation
          cache-to: type=gha,mode=max,scope=automation

      - name: Build and push console_ui image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: console/ui/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/console_ui:${{ env.TAG }}
          cache-from: type=gha,scope=console_ui
          cache-to: type=gha,mode=max,scope=console_ui

      - name: Build and push console_api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: console/service/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/console_api:${{ env.TAG }}
          cache-from: type=gha,scope=console_api
          cache-to: type=gha,mode=max,scope=console_api

      - name: Build and push console_db image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: console/db/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/console_db:${{ env.TAG }}
          cache-from: type=gha,scope=console_db
          cache-to: type=gha,mode=max,scope=console_db

      - name: Build and push console image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: console/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/console:${{ env.TAG }}
          cache-from: type=gha,scope=console
          cache-to: type=gha,mode=max,scope=console
